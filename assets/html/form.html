<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrations</title>
    <link rel="stylesheet" href="form.css">
</head>
<body class="body">
    <div class="box">
        <img class="img" src="img/forms_photo.png" alt="фотка дял формы">
        <div class="reg">
            <p class="title">Запись</p>
            <p class="small_title">Забронируйте дату и время</p>
            <div class="fields">
                <input class="input" type="text" placeholder="Введите ваше имя"  > </input>
                <input class="input" type="number" placeholder="Введите ваш телефон" > </input>
                <input class="input" type="date" placeholder="Выберите дату" min= > </input>
                <input class="input" type="time" placeholder="Выберите время"  > </input>
            </div>
            <button class="btn" onclick="window.location.href='main.html'">Записаться</button>
        </div>
    </div>

    <script src="photo.js"></script>
</body>
</html>
