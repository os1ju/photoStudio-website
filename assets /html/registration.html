<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrations</title>
    <link rel="stylesheet" href="registration.css">
</head>
<body class="body">
    <div class="box">
        <img class="img" src="forms_photo.png" alt="фотка дял формы">
        <div class="reg">
            <p class="title">Регистрация</p>
            <div class="fields">
                <input class="input" type="text" placeholder="Ваше имя"  > </input>
                <input class="input" type="email" placeholder="Почта" > </input>
                <input class="input" type="password" placeholder="Пароль" > </input>
                <input class="input" type="number" placeholder="Номер телефона"  > </input>
                <div class="gender">
                    <p class="text">Пол</p>
                    <p>м</p>
                    <input class="input"  placeholder="Номер телефона" type="radio" name="terms" value="agree" checked> 
                    <p>ж</p>
                    <input class="input"  placeholder="Номер телефона" type="radio" name="terms" value="agree" checked> 

                </div>
                <input class="input" type="date" placeholder="дата рождения"  > </input>
            </div>
            <a class="link" href="authorization.html">уже есть аккаунт? </a>
            <button class="btn" onclick="window.location.href='main.html'">Зарегистрироваться</button>
        </div>
    </div>
    
</body>
</html>
